# FDC 로컬 개발용: 인증 없이 MQTT 허용 (Node-RED, Telegraf 연동 편의)
# 사용법: 이 파일을 mosquitto.conf 로 복사하거나 docker-compose 에서 이 파일 마운트
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

listener 1883
allow_anonymous true

listener 9001
protocol websockets
allow_anonymous true
