  #     KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
  #     ALLOW_PLAINTEXT_LISTENER: "yes"
  #   volumes:
  #     - kafka_data:/bitnami/kafka
  #   networks:
  #     - n8n-net

volumes:
  n8n_data:
    external: true
    name: minseo_n8n_data
  influxdb_data:
  influxdb_config:
  grafana_data:
  superset_db_data:
  # kafka_data:

networks:
  n8n-net:
